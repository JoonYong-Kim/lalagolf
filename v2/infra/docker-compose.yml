services:
  web:
    build:
      context: ../web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:2324/api/v1
    ports:
      - "2323:2323"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: ../api
    environment:
      LALAGOLF_ENV: development
      DATABASE_URL: postgresql+psycopg://lalagolf:lalagolf@postgres:5432/lalagolf_v2
      REDIS_URL: redis://redis:6379/0
      ANALYSIS_ENQUEUE_ENABLED: "true"
      SECRET_KEY: change-me-in-local-env
      CORS_ORIGINS: http://localhost:2323,http://127.0.0.1:2323
      WEB_BASE_URL: http://localhost:2323
      GOOGLE_OAUTH_REDIRECT_URI: http://localhost:2324/api/v1/auth/google/callback
    ports:
      - "2324:2324"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    environment:
      LALAGOLF_ENV: development
      DATABASE_URL: postgresql+psycopg://lalagolf:lalagolf@postgres:5432/lalagolf_v2
      REDIS_URL: redis://redis:6379/0
      ANALYSIS_ENQUEUE_ENABLED: "true"
      ANALYSIS_QUEUE_NAME: analysis
      RQ_QUEUES: analysis
      WORKER_USE_RQ: "true"
      WORKER_POLL_INTERVAL_SECONDS: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lalagolf_v2
      POSTGRES_USER: lalagolf
      POSTGRES_PASSWORD: lalagolf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lalagolf -d lalagolf_v2"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
